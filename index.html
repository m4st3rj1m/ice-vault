<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ice Vault — Hockey Card Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ice: #e8f4fd;
    --ice-mid: #c5dff5;
    --rink: #0a1628;
    --rink-mid: #112240;
    --rink-light: #1a3356;
    --blue: #1e6fbb;
    --blue-bright: #3d9de8;
    --gold: #f0c040;
    --red: #e03030;
    --white: #f5f9ff;
    --muted: #7a9bbf;
    --border: rgba(61,157,232,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--rink);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background rink lines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 0%, rgba(30,111,187,0.12) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(61,157,232,0.04) 79px, rgba(61,157,232,0.04) 80px);
    pointer-events: none;
    z-index: 0;
  }

  /* Center ice circle */
  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    border: 1px solid rgba(61,157,232,0.06);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0;
    background: rgba(10,22,40,0.85);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; max-width: 1100px; margin: 0 auto;
  }
  .logo {
    display: flex; align-items: center; gap: 12px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--blue), var(--blue-bright));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--white);
  }
  .logo-text span { color: var(--blue-bright); }

  .header-stats {
    display: flex; gap: 28px;
  }
  .hstat {
    text-align: right;
  }
  .hstat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
    line-height: 1;
  }
  .hstat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── MAIN LAYOUT ── */
  .main { display: grid; grid-template-columns: 340px 1fr; gap: 24px; padding: 28px 0 60px; }

  /* ── ADD CARD PANEL ── */
  .panel {
    background: rgba(17,34,64,0.7);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(8px);
    overflow: hidden;
  }
  .panel-header {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .panel-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--ice);
  }
  .panel-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--blue-bright);
    box-shadow: 0 0 8px var(--blue-bright);
  }

  .form-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    font-weight: 500;
  }
  .field input, .field select {
    background: rgba(10,22,40,0.8);
    border: 1px solid rgba(61,157,232,0.2);
    border-radius: 8px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .field input::placeholder { color: rgba(122,155,191,0.5); }
  .field input:focus, .field select:focus {
    border-color: var(--blue-bright);
    box-shadow: 0 0 0 3px rgba(61,157,232,0.12);
  }
  .field select option { background: var(--rink-mid); }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 16px;
    border: none; cursor: pointer;
    border-radius: 10px;
    padding: 13px 20px;
    transition: all 0.2s;
    width: 100%;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue), var(--blue-bright));
    color: var(--white);
    box-shadow: 0 4px 20px rgba(30,111,187,0.35);
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(30,111,187,0.5);
  }
  .btn-primary:active { transform: translateY(0); }

  /* API Key section */
  .api-section {
    margin: 0 22px 20px;
    padding: 14px;
    background: rgba(240,192,64,0.07);
    border: 1px solid rgba(240,192,64,0.2);
    border-radius: 10px;
  }
  .api-section label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--gold);
    font-weight: 500;
    display: block; margin-bottom: 8px;
  }
  .api-row { display: flex; gap: 8px; }
  .api-row input {
    flex: 1;
    background: rgba(10,22,40,0.8);
    border: 1px solid rgba(240,192,64,0.25);
    border-radius: 7px;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
  }
  .api-row input:focus { border-color: var(--gold); }
  .btn-save-key {
    background: rgba(240,192,64,0.15);
    border: 1px solid rgba(240,192,64,0.3);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-save-key:hover { background: rgba(240,192,64,0.25); }
  .key-status {
    font-size: 11px;
    margin-top: 6px;
    color: var(--muted);
  }
  .key-status.ok { color: #4caf82; }

  /* ── COLLECTION PANEL ── */
  .collection-panel { display: flex; flex-direction: column; gap: 16px; }

  .coll-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .coll-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--ice);
  }
  .coll-title span { color: var(--blue-bright); font-size: 16px; letter-spacing: 1px; margin-left: 8px; }

  .btn-refresh {
    display: flex; align-items: center; gap: 8px;
    background: rgba(30,111,187,0.15);
    border: 1px solid rgba(61,157,232,0.3);
    color: var(--blue-bright);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-refresh:hover { background: rgba(30,111,187,0.3); }
  .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-refresh svg { width: 15px; height: 15px; }
  .spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Search bar */
  .search-bar {
    background: rgba(17,34,64,0.7);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center;
    padding: 0 14px; gap: 10px;
    backdrop-filter: blur(8px);
  }
  .search-bar input {
    flex: 1; background: none; border: none;
    color: var(--white); font-family: 'DM Sans', sans-serif;
    font-size: 14px; padding: 11px 0; outline: none;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar svg { color: var(--muted); flex-shrink: 0; }

  /* Cards table */
  .table-wrap {
    background: rgba(17,34,64,0.7);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(8px);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    font-weight: 600;
    padding: 14px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: rgba(10,22,40,0.4);
  }
  tbody tr {
    border-bottom: 1px solid rgba(61,157,232,0.07);
    transition: background 0.15s;
    animation: rowIn 0.3s ease both;
  }
  @keyframes rowIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  tbody tr:hover { background: rgba(61,157,232,0.06); }
  tbody tr:last-child { border-bottom: none; }
  td {
    padding: 13px 16px;
    font-size: 13.5px;
    color: var(--ice);
    vertical-align: middle;
  }

  .player-cell { font-weight: 600; color: var(--white); }
  .year-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: rgba(61,157,232,0.12);
    color: var(--blue-bright);
    padding: 3px 8px;
    border-radius: 5px;
  }
  .set-cell { color: var(--muted); font-size: 12.5px; }
  .num-cell {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .parallel-cell {
    font-size: 12px;
    color: var(--ice-mid);
  }
  .parallel-badge {
    display: inline-block;
    background: rgba(240,192,64,0.1);
    border: 1px solid rgba(240,192,64,0.2);
    color: var(--gold);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
  }

  .price-cell {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    min-width: 90px;
  }
  .price-val { color: #4caf82; }
  .price-pending {
    color: var(--muted);
    font-size: 11px;
    font-weight: 400;
  }
  .price-error { color: var(--red); font-size: 11px; }
  .price-loading {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(61,157,232,0.3);
    border-top-color: var(--blue-bright);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
  }

  .actions-cell { display: flex; gap: 8px; align-items: center; }
  .btn-icon {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    padding: 5px; border-radius: 6px;
    transition: all 0.15s;
    display: flex;
  }
  .btn-icon:hover { background: rgba(224,48,48,0.15); color: var(--red); }
  .btn-icon.ebay:hover { background: rgba(61,157,232,0.15); color: var(--blue-bright); }

  /* Empty state */
  .empty {
    padding: 60px 20px;
    text-align: center;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .empty p { color: var(--muted); font-size: 13px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 28px; right: 28px;
    background: var(--rink-light);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--ice);
    z-index: 999;
    transform: translateY(20px); opacity: 0;
    transition: all 0.3s;
    max-width: 300px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(76,175,130,0.4); }
  .toast.error { border-color: rgba(224,48,48,0.4); }

  /* Responsive */
  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; }
    .header-stats { display: none; }
    .field-row { grid-template-columns: 1fr; }
  }

  /* Summary bar */
  .summary-bar {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 12px; margin-bottom: 4px;
  }
  .scard {
    background: rgba(17,34,64,0.7);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    backdrop-filter: blur(8px);
  }
  .scard-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    color: var(--gold);
  }
  .scard-val.blue { color: var(--blue-bright); }
  .scard-val.green { color: #4caf82; }
  .scard-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🏒</div>
      <div class="logo-text">JIMBO'S ICE <span>VAULT</span></div>
    </div>
    <div class="header-stats">
      <div class="hstat">
        <div class="hstat-val" id="hstat-count">0</div>
        <div class="hstat-label">Cards</div>
      </div>
      <div class="hstat">
        <div class="hstat-val" id="hstat-value">—</div>
        <div class="hstat-label">Est. Value</div>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="main">

    <!-- ADD CARD PANEL -->
    <div>
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot"></div>
          <h2>ADD A CARD</h2>
        </div>
        <div class="form-body">
          <div class="field">
            <label>Player Name</label>
            <input type="text" id="f-player" placeholder="e.g. Connor McDavid">
          </div>
          <div class="field-row">
            <div class="field">
              <label>Year</label>
              <input type="text" id="f-year" placeholder="e.g. 2023-24">
            </div>
            <div class="field">
              <label>Card #</label>
              <input type="text" id="f-number" placeholder="e.g. 97">
            </div>
          </div>
          <div class="field">
            <label>Set / Collection</label>
            <input type="text" id="f-set" placeholder="e.g. Upper Deck Series 1">
          </div>
          <div class="field">
            <label>Parallel / Variant</label>
            <input type="text" id="f-parallel" placeholder="e.g. Young Guns, Retro, Gold">
          </div>
          <button class="btn btn-primary" onclick="addCard()">＋ ADD TO COLLECTION</button>
        </div>
      </div>

      <!-- API KEY -->
      <div class="panel" style="margin-top:16px;">
        <div class="panel-header">
          <div class="panel-dot" style="background:var(--gold);box-shadow:0 0 8px var(--gold)"></div>
          <h2>EBAY API KEY</h2>
        </div>
        <div style="padding:16px 22px 20px;">
          <div class="api-section" style="margin:0;">
            <label>🔑 App ID (Client ID)</label>
            <div class="api-row">
              <input type="password" id="api-key-input" placeholder="Paste your eBay App ID here">
              <button class="btn-save-key" onclick="saveApiKey()">Save</button>
            </div>
            <div class="key-status" id="key-status">No key saved — prices will not load.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- COLLECTION -->
    <div class="collection-panel">
      <div class="summary-bar">
        <div class="scard">
          <div class="scard-val blue" id="s-count">0</div>
          <div class="scard-label">Total Cards</div>
        </div>
        <div class="scard">
          <div class="scard-val green" id="s-value">—</div>
          <div class="scard-label">Est. Collection Value</div>
        </div>
        <div class="scard">
          <div class="scard-val" id="s-priced">0</div>
          <div class="scard-label">Cards Priced</div>
        </div>
      </div>

      <div class="coll-header">
        <div class="coll-title">MY COLLECTION <span id="card-count-label"></span></div>
        <button class="btn-refresh" id="refresh-btn" onclick="refreshAllPrices()">
          <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h5M20 20v-5h-5M4 9a9 9 0 0115.4-3.4M20 15a9 9 0 01-15.4 3.4"/>
          </svg>
          Refresh Prices
        </button>
      </div>

      <div class="search-bar">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search by player, set, parallel..." oninput="renderTable()">
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Player</th>
              <th>Year</th>
              <th>Set</th>
              <th>#</th>
              <th>Parallel</th>
              <th>Est. Price</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="card-table-body">
          </tbody>
        </table>
        <div class="empty" id="empty-state">
          <div class="empty-icon">🃏</div>
          <h3>YOUR VAULT IS EMPTY</h3>
          <p>Add your first card using the form on the left.</p>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── STATE ──
  let collection = JSON.parse(localStorage.getItem('icevault_cards') || '[]');
  let apiKey = localStorage.getItem('icevault_apikey') || '';

  // ── INIT ──
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey;
    document.getElementById('key-status').textContent = '✓ API key loaded.';
    document.getElementById('key-status').classList.add('ok');
  }
  renderTable();
  updateStats();

  // ── SAVE API KEY ──
  function saveApiKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) { showToast('Please enter your eBay App ID.', 'error'); return; }
    apiKey = val;
    localStorage.setItem('icevault_apikey', val);
    document.getElementById('key-status').textContent = '✓ API key saved!';
    document.getElementById('key-status').classList.add('ok');
    showToast('API key saved successfully!', 'success');
  }

  // ── ADD CARD ──
  function addCard() {
    const player = document.getElementById('f-player').value.trim();
    const year   = document.getElementById('f-year').value.trim();
    const set    = document.getElementById('f-set').value.trim();
    const number = document.getElementById('f-number').value.trim();
    const parallel = document.getElementById('f-parallel').value.trim();

    if (!player) { showToast('Player name is required.', 'error'); return; }

    const card = {
      id: Date.now(),
      player, year, set, number, parallel,
      price: null, priceStatus: 'pending'
    };

    collection.push(card);
    saveCollection();
    renderTable();
    updateStats();
    clearForm();
    showToast(`${player} added to your vault!`, 'success');
  }

  function clearForm() {
    ['f-player','f-year','f-set','f-number','f-parallel'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }

  // ── DELETE ──
  function deleteCard(id) {
    collection = collection.filter(c => c.id !== id);
    saveCollection();
    renderTable();
    updateStats();
    showToast('Card removed.', '');
  }

  // ── SAVE ──
  function saveCollection() {
    localStorage.setItem('icevault_cards', JSON.stringify(collection));
  }

  // ── RENDER TABLE ──
  function renderTable() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const filtered = collection.filter(c =>
      [c.player, c.set, c.parallel, c.year, c.number]
        .some(v => (v||'').toLowerCase().includes(query))
    );

    const empty = document.getElementById('empty-state');
    const tbody = document.getElementById('card-table-body');

    if (collection.length === 0) {
      empty.style.display = 'block';
      tbody.innerHTML = '';
      document.getElementById('card-count-label').textContent = '';
      return;
    }
    empty.style.display = 'none';
    document.getElementById('card-count-label').textContent =
      filtered.length !== collection.length
        ? `(${filtered.length} / ${collection.length})`
        : `(${collection.length})`;

    tbody.innerHTML = filtered.map(card => `
      <tr id="row-${card.id}">
        <td class="player-cell">${esc(card.player)}</td>
        <td><span class="year-badge">${esc(card.year||'—')}</span></td>
        <td class="set-cell">${esc(card.set||'—')}</td>
        <td class="num-cell">${esc(card.number ? '#'+card.number : '—')}</td>
        <td class="parallel-cell">${card.parallel
          ? `<span class="parallel-badge">${esc(card.parallel)}</span>`
          : '<span style="color:var(--muted)">—</span>'}</td>
        <td class="price-cell">${renderPrice(card)}</td>
        <td class="actions-cell">
          <button class="btn-icon ebay" title="Search on eBay" onclick="openEbay(${card.id})">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
            </svg>
          </button>
          <button class="btn-icon" title="Delete" onclick="deleteCard(${card.id})">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </td>
      </tr>
    `).join('');
  }

  function renderPrice(card) {
    if (card.priceStatus === 'loading') return '<span class="price-loading"></span>';
    if (card.priceStatus === 'found' && card.price !== null)
      return `<span class="price-val">~$${card.price.toFixed(2)}</span>`;
    if (card.priceStatus === 'error') return '<span class="price-error">Not found</span>';
    return '<span class="price-pending">—</span>';
  }

  // ── OPEN EBAY ──
  function openEbay(id) {
    const card = collection.find(c => c.id === id);
    if (!card) return;
    const q = buildQuery(card);
    window.open(`https://www.ebay.com/sch/i.html?_nkw=${encodeURIComponent(q)}&LH_Sold=1&LH_Complete=1`, '_blank');
  }

  function buildQuery(card) {
    return [card.year, card.player, card.set, card.parallel, card.number ? '#'+card.number : '']
      .filter(Boolean).join(' ');
  }

  // ── REFRESH PRICES ──
  async function refreshAllPrices() {
    if (!apiKey) {
      showToast('Please save your eBay API key first.', 'error');
      return;
    }
    if (collection.length === 0) {
      showToast('No cards in your collection yet.', '');
      return;
    }

    const btn = document.getElementById('refresh-btn');
    const icon = document.getElementById('refresh-icon');
    btn.disabled = true;
    icon.classList.add('spinning');

    // Set all to loading
    collection.forEach(c => c.priceStatus = 'loading');
    renderTable();

    let done = 0;
    for (const card of collection) {
      await fetchPrice(card);
      done++;
      saveCollection();
      renderTable();
      updateStats();
    }

    btn.disabled = false;
    icon.classList.remove('spinning');
    showToast(`Prices updated for ${done} card(s).`, 'success');
  }

  async function fetchPrice(card) {
    const query = buildQuery(card);
    const ebayUrl = `https://svcs.ebay.com/services/search/FindingService/v1`
      + `?OPERATION-NAME=findCompletedItems`
      + `&SERVICE-VERSION=1.0.0`
      + `&SECURITY-APPNAME=${encodeURIComponent(apiKey)}`
      + `&RESPONSE-DATA-FORMAT=JSON`
      + `&keywords=${encodeURIComponent(query)}`
      + `&categoryId=212`
      + `&itemFilter(0).name=SoldItemsOnly&itemFilter(0).value=true`
      + `&sortOrder=EndTimeSoonest`
      + `&paginationInput.entriesPerPage=10`;

    const url = `https://api.allorigins.win/get?url=${encodeURIComponent(ebayUrl)}`;

    try {
      const res = await fetch(url);
      const json = await res.json();
      const data = JSON.parse(json.contents);
      const items = data?.findCompletedItemsResponse?.[0]
        ?.searchResult?.[0]?.item || [];

      if (items.length === 0) {
        card.priceStatus = 'error'; card.price = null; return;
      }

      const prices = items
        .map(i => parseFloat(i?.sellingStatus?.[0]?.currentPrice?.[0]?.__value__))
        .filter(p => !isNaN(p) && p > 0);

      if (prices.length === 0) {
        card.priceStatus = 'error'; card.price = null; return;
      }

      // Median price
      prices.sort((a,b) => a-b);
      const mid = Math.floor(prices.length / 2);
      card.price = prices.length % 2 !== 0
        ? prices[mid]
        : (prices[mid-1] + prices[mid]) / 2;
      card.priceStatus = 'found';

    } catch(e) {
      card.priceStatus = 'error'; card.price = null;
    }
  }

  // ── STATS ──
  function updateStats() {
    const count = collection.length;
    const priced = collection.filter(c => c.priceStatus === 'found' && c.price !== null);
    const total = priced.reduce((s, c) => s + c.price, 0);

    document.getElementById('s-count').textContent = count;
    document.getElementById('hstat-count').textContent = count;
    document.getElementById('s-priced').textContent = priced.length;

    if (priced.length > 0) {
      const fmt = '$' + total.toFixed(2);
      document.getElementById('s-value').textContent = fmt;
      document.getElementById('hstat-value').textContent = fmt;
    } else {
      document.getElementById('s-value').textContent = '—';
      document.getElementById('hstat-value').textContent = '—';
    }
  }

  // ── TOAST ──
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function esc(str) {
    return String(str||'')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter key to add card
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && ['f-player','f-year','f-set','f-number','f-parallel'].includes(e.target.id)) {
      addCard();
    }
  });
</script>
</body>
</html>
